<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#565A5C">
  <title>Komfort - HR System</title>
  <link rel="manifest" href="/manifest.json">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --primary: #404042;        /* Komfort dark charcoal */
      --primary-light: #565A5C;  /* Komfort charcoal */
      --accent: #FDC82F;         /* Komfort yellow */
      --success: #2e7d32;
      --warning: #ef6c00;
      --danger: #c62828;
      --info: #1565c0;
      --bg: #F4F6F7;
      --card: #ffffff;
      --text: #404042;
      --text-light: #757677;
      --border: #dfe2e4;
      --shadow: 0 2px 8px rgba(64,64,66,0.12);
      --sidebar-w: 240px;
    }
    body { font-family: Helvetica, Arial, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    h1,h2,h3,h4,h5,h6 { color: var(--primary); font-weight: 700; }
    a { color: var(--info); }

    .hidden { display: none !important; }

    /* ── Buttons ── */
    .btn { display: inline-flex; align-items: center; justify-content: center; padding: 10px 18px; border: none; border-radius: 8px; font-size: 0.95rem; font-weight: 500; cursor: pointer; transition: all .2s; text-decoration: none; gap: 8px; }
    .btn-primary { background: var(--primary-light); color: var(--accent); }
    .btn-primary:hover { background: var(--primary); }
    .btn-accent { background: var(--accent); color: var(--primary); }
    .btn-accent:hover { filter: brightness(.95); }
    .btn-success { background: var(--success); color: #fff; }
    .btn-danger { background: var(--danger); color: #fff; }
    .btn-warning { background: var(--warning); color: #fff; }
    .btn-outline { background: transparent; border: 2px solid var(--primary); color: var(--primary); }
    .btn-outline:hover { background: var(--primary); color: var(--accent); }
    .btn-sm { padding: 6px 12px; font-size: 0.825rem; }
    .btn:disabled { opacity: .5; cursor: not-allowed; }

    /* ── Forms ── */
    .form-group { margin-bottom: 14px; }
    .form-group label { display: block; font-weight: 600; margin-bottom: 5px; color: var(--text); font-size: 0.875rem; }
    .form-group input, .form-group select, .form-group textarea {
      width: 100%; padding: 10px; border: 2px solid var(--border); border-radius: 8px; font-size: 0.95rem; background: #fff; font-family: inherit;
    }
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: var(--primary); outline: none; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .form-row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; }
    .req::after { content: " *"; color: var(--danger); }
    fieldset { border: 1px solid var(--border); border-radius: 10px; padding: 16px; margin-bottom: 16px; }
    legend { padding: 0 8px; font-weight: 700; color: var(--primary); font-size: 0.95rem; }

    /* ── Cards / layout ── */
    .card { background: var(--card); border-radius: 12px; box-shadow: var(--shadow); padding: 20px; margin-bottom: 16px; }
    .card-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; flex-wrap: wrap; gap: 10px; }
    .muted { color: var(--text-light); }
    .small { font-size: 0.85rem; }

    /* ── Stat tiles ── */
    .stat-grid { display: grid; grid-template-columns: repeat(auto-fit,minmax(170px,1fr)); gap: 16px; margin-bottom: 16px; }
    .stat { background: var(--card); border-radius: 12px; box-shadow: var(--shadow); padding: 18px; border-left: 5px solid var(--accent); position: relative; }
    .stat .num { font-size: 2rem; font-weight: 700; color: var(--primary); }
    .stat.clickable { cursor: pointer; transition: transform .15s, box-shadow .15s; }
    .stat.clickable:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(64,64,66,0.18); }
    .stat.clickable::after { content: "›"; position: absolute; top: 12px; right: 14px; color: var(--text-light); font-size: 1.2rem; opacity: .5; }
    .stat .lbl { color: var(--text-light); font-size: 0.85rem; margin-top: 2px; }
    .stat.warn { border-left-color: var(--warning); }
    .stat.ok { border-left-color: var(--success); }
    .stat.info { border-left-color: var(--info); }

    /* ── Tables ── */
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 10px 12px; text-align: left; border-bottom: 1px solid var(--border); font-size: 0.9rem; vertical-align: middle; }
    th { background: var(--bg); font-weight: 700; color: var(--primary); white-space: nowrap; }
    tbody tr:hover { background: #fafbfc; }
    .clickable { cursor: pointer; }

    /* ── Badges ── */
    .badge { display: inline-block; padding: 3px 10px; border-radius: 12px; font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: .3px; }
    .b-green { background: #e3f3e4; color: var(--success); }
    .b-red { background: #fde8e8; color: var(--danger); }
    .b-amber { background: #fff3e0; color: var(--warning); }
    .b-grey { background: #e9ecef; color: var(--text-light); }
    .b-blue { background: #e3f0fb; color: var(--info); }
    .b-yellow { background: var(--accent); color: var(--primary); }

    /* ── Avatar ── */
    .avatar { width: 40px; height: 40px; border-radius: 50%; background: var(--primary-light); color: var(--accent); display: inline-flex; align-items: center; justify-content: center; font-weight: 700; flex-shrink: 0; overflow: hidden; font-size: 0.9rem; }
    .avatar img { width: 100%; height: 100%; object-fit: cover; }
    .avatar-lg { width: 96px; height: 96px; font-size: 2rem; }

    /* ── Login ── */
    #login-view { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg,#404042,#565A5C); padding: 20px; }
    .login-card { background: #fff; border-radius: 16px; box-shadow: 0 10px 40px rgba(0,0,0,.3); padding: 36px; width: 100%; max-width: 400px; border-top: 6px solid var(--accent); }
    .login-logo { text-align: center; margin-bottom: 8px; font-size: 1.8rem; font-weight: 700; letter-spacing: 1px; color: var(--primary); }
    .login-sub { text-align: center; color: var(--text-light); margin-bottom: 24px; }
    .login-hint { margin-top: 18px; font-size: 0.78rem; color: var(--text-light); background: var(--bg); border-radius: 8px; padding: 10px 12px; }

    /* ── App shell ── */
    #app { display: none; min-height: 100vh; }
    #app.active { display: flex; }
    .sidebar { width: var(--sidebar-w); background: var(--primary); color: #fff; display: flex; flex-direction: column; position: fixed; top: 0; bottom: 0; left: 0; z-index: 50; transition: transform .25s; }
    .sidebar .brand { padding: 20px; border-bottom: 1px solid rgba(255,255,255,.1); }
    .sidebar .brand .logo { font-size: 1.3rem; font-weight: 700; color: var(--accent); letter-spacing: 1px; }
    .sidebar .brand .sub { font-size: 0.75rem; color: rgba(255,255,255,.6); }
    .nav { flex: 1; overflow-y: auto; padding: 10px 0; }
    .nav-item { display: flex; align-items: center; gap: 12px; padding: 12px 20px; color: rgba(255,255,255,.82); cursor: pointer; font-size: 0.92rem; border-left: 4px solid transparent; }
    .nav-item:hover { background: rgba(255,255,255,.06); color: #fff; }
    .nav-item.active { background: rgba(253,200,47,.14); color: var(--accent); border-left-color: var(--accent); font-weight: 600; }
    .nav-item .ic { width: 20px; text-align: center; }
    .nav-badge { margin-left: auto; background: var(--accent); color: var(--primary); border-radius: 10px; padding: 1px 8px; font-size: 0.72rem; font-weight: 700; }
    .sidebar .who { padding: 14px 20px; border-top: 1px solid rgba(255,255,255,.1); font-size: 0.82rem; }
    .sidebar .who .name { color: #fff; font-weight: 600; }
    .sidebar .who .role { color: rgba(255,255,255,.55); text-transform: capitalize; }

    .main { flex: 1; margin-left: var(--sidebar-w); display: flex; flex-direction: column; min-height: 100vh; }
    .topbar { background: var(--primary-light); color: var(--accent); padding: 14px 22px; display: flex; align-items: center; justify-content: space-between; box-shadow: var(--shadow); position: sticky; top: 0; z-index: 40; border-bottom: 4px solid var(--accent); }
    .topbar h1 { color: var(--accent); font-size: 1.2rem; }
    .topbar .ta { display: flex; gap: 8px; align-items: center; }
    .hamburger { display: none; background: none; border: none; color: var(--accent); font-size: 1.5rem; cursor: pointer; }
    .content { padding: 22px; flex: 1; }

    /* ── Tabs ── */
    .tabs { display: flex; gap: 4px; border-bottom: 2px solid var(--border); margin-bottom: 18px; flex-wrap: wrap; }
    .tab { padding: 10px 16px; cursor: pointer; font-weight: 600; color: var(--text-light); border-bottom: 3px solid transparent; margin-bottom: -2px; font-size: 0.9rem; }
    .tab.active { color: var(--primary); border-bottom-color: var(--accent); }

    /* ── Toolbar ── */
    .toolbar { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; margin-bottom: 16px; }
    .toolbar input, .toolbar select { padding: 9px 12px; border: 2px solid var(--border); border-radius: 8px; font-size: 0.9rem; background: #fff; }
    .toolbar .grow { flex: 1; min-width: 180px; }

    /* ── Modal ── */
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 1000; align-items: flex-start; justify-content: center; padding: 30px 16px; overflow-y: auto; }
    .modal-overlay.active { display: flex; }
    .modal { background: #fff; border-radius: 14px; padding: 24px; max-width: 640px; width: 100%; margin: auto; }
    .modal.wide { max-width: 860px; }
    .modal h2 { margin-bottom: 4px; }
    .modal .modal-sub { color: var(--text-light); margin-bottom: 16px; font-size: 0.9rem; }
    .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 18px; flex-wrap: wrap; }

    /* ── Toast ── */
    .toast-container { position: fixed; bottom: 20px; right: 20px; z-index: 2000; }
    .toast { padding: 12px 18px; border-radius: 8px; color: #fff; margin-top: 8px; font-weight: 500; box-shadow: var(--shadow); animation: slideIn .3s; }
    .toast-success { background: var(--success); }
    .toast-error { background: var(--danger); }
    .toast-info { background: var(--info); }
    @keyframes slideIn { from { transform: translateX(110%);} to { transform: translateX(0);} }

    /* ── Detail layout ── */
    .detail-head { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; margin-bottom: 6px; }
    .detail-head .who h2 { margin: 0; }
    .kv { display: grid; grid-template-columns: 180px 1fr; gap: 8px 16px; }
    .kv dt { font-weight: 600; color: var(--text-light); font-size: 0.85rem; }
    .kv dd { font-size: 0.95rem; }
    @media (max-width: 600px){ .kv { grid-template-columns: 1fr; gap: 2px 0; } .kv dd { margin-bottom: 8px; } }

    .progress { height: 8px; background: var(--border); border-radius: 4px; overflow: hidden; min-width: 80px; }
    .progress > div { height: 100%; background: var(--success); border-radius: 4px; }

    .empty { text-align: center; color: var(--text-light); padding: 40px 20px; }
    .empty .ic { font-size: 2.5rem; display: block; margin-bottom: 8px; opacity: .5; }

    .pill-tabs { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
    .pill { padding: 6px 14px; border-radius: 20px; border: 2px solid var(--border); background: #fff; cursor: pointer; font-size: 0.85rem; font-weight: 600; color: var(--text-light); }
    .pill.active { background: var(--primary); color: var(--accent); border-color: var(--primary); }

    .doc-row { display: flex; align-items: center; gap: 12px; padding: 12px; border: 1px solid var(--border); border-radius: 10px; margin-bottom: 10px; }
    .doc-row .dic { font-size: 1.6rem; }
    .doc-row .di { flex: 1; min-width: 0; }
    .doc-row .di .t { font-weight: 600; }

    @media (max-width: 860px){
      .sidebar { transform: translateX(-100%); }
      .sidebar.open { transform: translateX(0); }
      .main { margin-left: 0; }
      .hamburger { display: block; }
      .form-row, .form-row-3 { grid-template-columns: 1fr; }
    }
    @media print {
      .sidebar, .topbar, .toolbar, .btn, .tabs, .pill-tabs { display: none !important; }
      .main { margin-left: 0; }
      .content { padding: 0; }
      #app.active { display: block; }
      body { background: white; }
      .payslip-print { padding: 16px; color: #000; page-break-inside: avoid; }
      .payslip-print table { color: #000; }
    }
  </style>
</head>
<body>

<!-- ═══════════════ LOGIN ═══════════════ -->

<div id="app">
  <aside class="sidebar" id="sidebar">

<div class="modal-overlay" id="modal-overlay"><div class="modal" id="modal"></div></div>
<div class="toast-container" id="toast-container"></div>

<script>
// ═══════════════════════════════════════════════════════════════
// DATABASE LAYER — IndexedDB (offline/local persistence)
// Mirrors the schema in database.js so it can move to the Node
// backend later without changing the data shape.
// ═══════════════════════════════════════════════════════════════
const DB_NAME = 'KomfortHR';
const DB_VERSION = 2;
const STORES = ['users','employees','contacts','documents','leave','reviews','objectives','tasks','audit_log','settings','pay_components','pay_runs','payslips'];
let db = null;

function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = (e) => {
      const d = e.target.result;
      if (!d.objectStoreNames.contains('users')) {
        const s = d.createObjectStore('users', { keyPath: 'id' });
        s.createIndex('username', 'username', { unique: true });
        s.createIndex('employee_id', 'employee_id');
      }
      if (!d.objectStoreNames.contains('employees')) {
        const s = d.createObjectStore('employees', { keyPath: 'id' });
        s.createIndex('manager_id', 'manager_id');
        s.createIndex('status', 'status');
      }
      if (!d.objectStoreNames.contains('contacts')) {
        const s = d.createObjectStore('contacts', { keyPath: 'id' });
        s.createIndex('employee_id', 'employee_id');
      }
      if (!d.objectStoreNames.contains('documents')) {
        const s = d.createObjectStore('documents', { keyPath: 'id' });
        s.createIndex('employee_id', 'employee_id');
        s.createIndex('category', 'category');
      }
      if (!d.objectStoreNames.contains('leave')) {
        const s = d.createObjectStore('leave', { keyPath: 'id' });
        s.createIndex('employee_id', 'employee_id');
        s.createIndex('status', 'status');
      }
      if (!d.objectStoreNames.contains('reviews')) {
        const s = d.createObjectStore('reviews', { keyPath: 'id' });
        s.createIndex('employee_id', 'employee_id');
      }
      if (!d.objectStoreNames.contains('objectives')) {
        const s = d.createObjectStore('objectives', { keyPath: 'id' });
        s.createIndex('employee_id', 'employee_id');
      }
      if (!d.objectStoreNames.contains('tasks')) {
        const s = d.createObjectStore('tasks', { keyPath: 'id' });
        s.createIndex('assigned_to', 'assigned_to');
        s.createIndex('status', 'status');
      }
      if (!d.objectStoreNames.contains('audit_log')) {
        const s = d.createObjectStore('audit_log', { keyPath: 'id', autoIncrement: true });
        s.createIndex('timestamp', 'timestamp');
      }
      if (!d.objectStoreNames.contains('settings')) {
        d.createObjectStore('settings', { keyPath: 'key' });
      }
      if (!d.objectStoreNames.contains('pay_components')) {
        const s = d.createObjectStore('pay_components', { keyPath: 'id' });
        s.createIndex('code', 'code', { unique: true });
        s.createIndex('category', 'category');
      }
      if (!d.objectStoreNames.contains('pay_runs')) {
        const s = d.createObjectStore('pay_runs', { keyPath: 'id' });
        s.createIndex('period', 'period');
        s.createIndex('status', 'status');
      }
      if (!d.objectStoreNames.contains('payslips')) {
        const s = d.createObjectStore('payslips', { keyPath: 'id' });
        s.createIndex('pay_run_id', 'pay_run_id');
        s.createIndex('employee_id', 'employee_id');
      }
    };
    req.onsuccess = (e) => { db = e.target.result; resolve(db); };
    req.onerror = (e) => reject(e.target.error);
  });
}
const tx = (store, mode='readonly') => db.transaction(store, mode).objectStore(store);
function idbGetAll(s){ return new Promise((res,rej)=>{ const r=tx(s).getAll(); r.onsuccess=()=>res(r.result); r.onerror=e=>rej(e.target.error); }); }
function idbGet(s,k){ return new Promise((res,rej)=>{ const r=tx(s).get(k); r.onsuccess=()=>res(r.result); r.onerror=e=>rej(e.target.error); }); }
function idbPut(s,v){ return new Promise((res,rej)=>{ const r=tx(s,'readwrite').put(v); r.onsuccess=()=>res(r.result); r.onerror=e=>rej(e.target.error); }); }
function idbAdd(s,v){ return new Promise((res,rej)=>{ const r=tx(s,'readwrite').add(v); r.onsuccess=()=>res(r.result); r.onerror=e=>rej(e.target.error); }); }
function idbDelete(s,k){ return new Promise((res,rej)=>{ const r=tx(s,'readwrite').delete(k); r.onsuccess=()=>res(); r.onerror=e=>rej(e.target.error); }); }
function idbByIndex(s,idx,val){ return new Promise((res,rej)=>{ const r=tx(s).index(idx).getAll(val); r.onsuccess=()=>res(r.result); r.onerror=e=>rej(e.target.error); }); }

function uuid(){ return crypto.randomUUID ? crypto.randomUUID() : 'xxxxxxxx'.replace(/x/g,()=>Math.floor(Math.random()*16).toString(16)); }
function nowISO(){ return new Date().toISOString(); }
function today(){ return new Date().toISOString().slice(0,10); }

async function sha256(str){
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}
async function logAction(action, details={}){ try{ await idbAdd('audit_log', { timestamp: nowISO(), user: state.user?.username||'system', action, ...details }); }catch(e){} }

// ═══════════════════════════════════════════════
// SETTINGS / CONSTANTS
// ═══════════════════════════════════════════════
const SITES = ['Leeds','Axcess-10','Crawley'];
const DEPARTMENTS = ['Operations','Manufacturing','Sales','Finance','HR','Design','Installation','Logistics','Management'];
const LEAVE_TYPES = {
  holiday:    { label:'Holiday',          deducts:true,  colour:'b-blue'  },
  sickness:   { label:'Sickness',         deducts:false, colour:'b-red'   },
  unpaid:     { label:'Unpaid leave',     deducts:false, colour:'b-grey'  },
  maternity:  { label:'Maternity/Paternity', deducts:false, colour:'b-amber' },
  other:      { label:'Other',            deducts:false, colour:'b-grey'  },
  adjustment: { label:'Adjustment',       deducts:false, colour:'b-yellow' }
};
// Absence types that appear in the "other absence" area (not holiday, sickness or adjustment)
const OTHER_ABSENCE = ['unpaid','maternity','other'];
const EMPLOYMENT_TYPES = ['Permanent','Contract','Casual'];
const TITLES = ['Mr','Mrs','Ms','Miss','Mx','Dr','Prof'];
const DEFAULT_ALLOWANCE = 25;

// Build <option>s, preserving an existing value even if it's not in the list.
function optionList(options, current){
  const opts = options.slice();
  if (current && !opts.includes(current)) opts.unshift(current);
  return opts.map(o=>`<option ${current===o?'selected':''}>${esc(o)}</option>`).join('');
}

async function getSetting(key, fallback){ const r = await idbGet('settings', key); return r ? r.value : fallback; }
async function setSetting(key, value){ return idbPut('settings', { key, value }); }

// ═══════════════════════════════════════════════
// SEED DATA
// ═══════════════════════════════════════════════
async function seedDefaults(){
  const users = await idbGetAll('users');
  if (users.length > 0) return;

  await setSetting('holiday_year_start', '01-01'); // MM-DD
  await setSetting('company_name', 'Komfort Partitioning Ltd');

  // Sample employees
  const mgrId = uuid(), empId = uuid(), e3 = uuid(), e4 = uuid(), e5 = uuid();
  const mk = (id, o) => ({
    id, title:o.ttl||'', employee_number:o.num, first_name:o.fn, last_name:o.ln, preferred_name:'',
    date_of_birth:o.dob, gender:o.g||'', ni_number:o.ni, tax_code:o.tax||'1257L',

  await logAction('login');
  await enterApp();

async function computeBadges(){

  if (state.user.role === 'manager'){
    const team = teamMemberIds();
    pending = pending.filter(l => team.includes(l.employee_id));
  }
  let openTasks = tasks.filter(t => t.status !== 'done');
  if (state.user.role === 'manager') openTasks = openTasks.filter(t => t.assigned_to === state.user.id);
  return {
    pendingHoliday: pending.filter(l=>l.type==='holiday').length,
    pendingSickness: pending.filter(l=>l.type==='sickness').length,
    pendingOther: pending.filter(l=>OTHER_ABSENCE.includes(l.type)).length,

  };

// working days (Mon–Fri) inclusive
function workingDays(start, end){
  let d=new Date(start), e=new Date(end), n=0;
  if (isNaN(d)||isNaN(e)||e<d) return 0;
  while(d<=e){ const wd=d.getDay(); if(wd!==0&&wd!==6) n++; d.setDate(d.getDate()+1); }
  return n;
}

// Holiday year boundaries for a given date
async function holidayYearBounds(ref){
  const mmdd = await getSetting('holiday_year_start','01-01');
  const [mm,dd] = mmdd.split('-').map(Number);
  const r = ref?new Date(ref):new Date();
  let startYear = r.getFullYear();
  const boundary = new Date(startYear, mm-1, dd);
  if (r < boundary) startYear -= 1;
  const start = new Date(startYear, mm-1, dd);
  const end = new Date(startYear+1, mm-1, dd); end.setDate(end.getDate()-1);
  return { start: start.toISOString().slice(0,10), end: end.toISOString().slice(0,10), label:`${startYear}/${String((startYear+1)).slice(2)}` };
}

async function leaveBalance(employeeId){
  const e = empById(employeeId);
  const allowance = e?.holiday_allowance ?? DEFAULT_ALLOWANCE;
  const bounds = await holidayYearBounds();
  const rows = await idbByIndex('leave','employee_id',employeeId);
  let booked=0, pending=0, adjustments=0;
  rows.forEach(l => {
    if (l.start_date < bounds.start || l.start_date > bounds.end) return;
    if (l.type==='adjustment'){ adjustments += Number(l.days)||0; return; }
    if (l.type!=='holiday') return;
    if (l.status==='approved') booked += l.days;
    else if (l.status==='pending') pending += l.days;
  });
  const entitlement = allowance + adjustments;
  // Only BOOKED (approved) holiday is deducted from remaining; pending is shown
  // separately and does NOT reduce the balance until it's approved/booked.
  return { allowance, adjustments, entitlement, booked, taken: booked, pending, remaining: entitlement - booked, bounds };
}

async function openHolidayList(empId, kind){
  const bounds = await holidayYearBounds();
  const rows = (await idbByIndex('leave','employee_id',empId)).filter(l=>l.type==='holiday' && l.start_date>=bounds.start && l.start_date<=bounds.end);
  const list = (kind==='booked' ? rows.filter(l=>l.status==='approved') : rows.filter(l=>l.status==='pending')).sort((a,b)=>a.start_date.localeCompare(b.start_date));
  const label = kind==='booked' ? 'Booked holiday' : 'Pending holiday';
  const body = list.length ? `<div class="table-wrap"><table><thead><tr><th>From</th><th>To</th><th>Days</th><th>Reason</th></tr></thead><tbody>${list.map(l=>`<tr><td>${fmtDate(l.start_date)}</td><td>${fmtDate(l.end_date)}</td><td>${l.days}</td><td class="small">${esc(l.reason)||'—'}</td></tr>`).join('')}</tbody></table></div>` : '<div class="empty small">None.</div>';
  openModal(`<h2>${label} — ${esc(empName(empId))}</h2><div class="modal-sub">${bounds.label}</div><div>${body}</div><div class="modal-actions"><button class="btn btn-outline" onclick="closeModal()">Close</button></div>`);
}
// Length of service as "X years, Y months"
function serviceYM(start){
  if(!start) return '—';
  const s=new Date(start), n=new Date();
  if(isNaN(s)) return '—';
  let months=(n.getFullYear()-s.getFullYear())*12+(n.getMonth()-s.getMonth());
  if(n.getDate()<s.getDate()) months--;
  if(months<0) months=0;
  const y=Math.floor(months/12), m=months%12;
  const yPart = y>0?`${y} year${y!==1?'s':''}`:'';
  const mPart = `${m} month${m!==1?'s':''}`;
  return (y>0? yPart+', ':'') + mPart;
}

function downloadCSV(filename, rows){
  const csv = rows.map(r => r.map(c => {
    const s = c==null?'':String(c);
    return /[",\n]/.test(s) ? '"'+s.replace(/"/g,'""')+'"' : s;
  }).join(',')).join('\n');
  const blob = new Blob([csv], {type:'text/csv'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob); a.download = filename; a.click();
  URL.revokeObjectURL(a.href);
}

// Drill-down list when a dashboard tile is clicked
async function openDashList(kind){
  const isMgr = state.user.role==='manager';

  const inScope = id => !team || team.includes(id);
  const bounds = await holidayYearBounds();

    const list = state.employees.filter(e=>e.status==='active' && inScope(e.id)).sort((a,b)=>a.last_name.localeCompare(b.last_name));
    title = `Active employees (${list.length})`;
    html = tableWrap('<th>Name</th><th>Job title</th><th>Dept</th><th>Site</th>',
      list.map(e=>`<tr class="clickable" onclick="closeModal();employeeDetail('${e.id}')"><td>${esc(e.first_name+' '+e.last_name)}</td><td>${esc(e.job_title)}</td><td>${esc(e.department)}</td><td>${esc(e.site)}</td></tr>`).join(''), 'No active employees.');
  } else if (kind==='offtoday'){
    const list = (await idbGetAll('leave')).filter(l=>l.type!=='adjustment' && l.status==='approved' && l.start_date<=today() && l.end_date>=today() && inScope(l.employee_id)).sort((a,b)=>a.end_date.localeCompare(b.end_date));
    title = `Off today (${list.length})`;
    html = tableWrap('<th>Employee</th><th>Type</th><th>From</th><th>Back</th>',
      list.map(l=>`<tr><td>${esc(empName(l.employee_id))}</td><td><span class="badge ${LEAVE_TYPES[l.type].colour}">${LEAVE_TYPES[l.type].label}</span></td><td>${fmtDate(l.start_date)}</td><td>${fmtDate(addDays(l.end_date,1))}</td></tr>`).join(''), 'Everyone is in today.');
  } else if (kind==='pending'){
    const list = (await idbGetAll('leave')).filter(l=>l.status==='pending' && inScope(l.employee_id)).sort((a,b)=>a.start_date.localeCompare(b.start_date));
    title = `Leave to approve (${list.length})`;
    html = tableWrap('<th>Employee</th><th>Type</th><th>From</th><th>To</th><th>Days</th><th></th>',
      list.map(l=>`<tr><td>${esc(empName(l.employee_id))}</td><td><span class="badge ${LEAVE_TYPES[l.type].colour}">${LEAVE_TYPES[l.type].label}</span></td><td>${fmtDate(l.start_date)}</td><td>${fmtDate(l.end_date)}</td><td>${l.days}</td><td style="text-align:right;white-space:nowrap"><button class="btn btn-success btn-sm" onclick="closeModal();decideLeave('${l.id}','approved')">Approve</button> <button class="btn btn-danger btn-sm" onclick="closeModal();decideLeave('${l.id}','rejected')">Reject</button></td></tr>`).join(''), 'Nothing awaiting approval.');
  } else if (kind==='sick'){
    const list = (await idbGetAll('leave')).filter(l=>l.type==='sickness' && l.status==='approved' && l.start_date>=bounds.start && l.start_date<=bounds.end && inScope(l.employee_id)).sort((a,b)=>b.start_date.localeCompare(a.start_date));
    const total = list.reduce((a,l)=>a+l.days,0);
    title = `Sickness — ${total} day${total!==1?'s':''} (${bounds.label})`;
    html = tableWrap('<th>Employee</th><th>From</th><th>To</th><th>Days</th><th>Reason</th>',
      list.map(l=>`<tr><td>${esc(empName(l.employee_id))}</td><td>${fmtDate(l.start_date)}</td><td>${fmtDate(l.end_date)}</td><td>${l.days}</td><td class="small">${esc(l.reason)||'—'}</td></tr>`).join(''), 'No sickness recorded this year.');
  } else if (kind==='probation'){
    const list = state.employees.filter(e=>e.status==='active' && inScope(e.id) && e.probation_end_date && e.probation_end_date<=addDays(today(),45)).sort((a,b)=>a.probation_end_date.localeCompare(b.probation_end_date));
    title = `Probation reviews due (${list.length})`;
    html = tableWrap('<th>Employee</th><th>Job title</th><th>Manager</th><th>Probation ends</th>',
      list.map(e=>`<tr class="clickable" onclick="closeModal();employeeDetail('${e.id}')"><td>${esc(e.first_name+' '+e.last_name)}</td><td>${esc(e.job_title)}</td><td>${e.manager_id?esc(empName(e.manager_id)):'—'}</td><td>${fmtDate(e.probation_end_date)} ${e.probation_end_date<today()?'<span class="badge b-red">Overdue</span>':'<span class="badge b-amber">Due soon</span>'}</td></tr>`).join(''), 'No probation reviews due.');
  } else if (kind==='tasks'){
    let list = (await idbGetAll('tasks')).filter(t=>t.status!=='done');
    if (isMgr) list = list.filter(t=>t.assigned_to===state.user.id);
    list.sort((a,b)=>(a.due_date||'').localeCompare(b.due_date||''));
    title = `Open tasks (${list.length})`;
    html = tableWrap('<th>Task</th><th>Related to</th><th>Due</th><th>Priority</th>',
      list.map(t=>`<tr><td>${esc(t.title)}${t.due_date&&t.due_date<today()?' <span class="badge b-red">Overdue</span>':''}</td><td>${t.related_employee_id?esc(empName(t.related_employee_id)):'—'}</td><td>${fmtDate(t.due_date)}</td><td>${priorityBadge(t.priority)}</td></tr>`).join(''), 'No open tasks.');
  }
  openModal(`<h2>${title}</h2><div style="margin-top:12px">${html}</div><div class="modal-actions"><button class="btn btn-outline" onclick="closeModal()">Close</button></div>`, true);
}

function filterEmployees(){
  const q = (document.getElementById('emp-search')?.value||'').toLowerCase();
  const site = document.getElementById('emp-site')?.value||'';
  const dept = document.getElementById('emp-dept')?.value||'';
  const st = document.getElementById('emp-status')?.value;
  let rows = window._allEmps.filter(e => {
    if (site && e.site!==site) return false;
    if (dept && e.department!==dept) return false;
    if (st!=='' && st!==undefined && e.status!==st) return false;
    if (q){ const hay=`${e.first_name} ${e.last_name} ${e.employee_number} ${e.job_title}`.toLowerCase(); if(!hay.includes(q)) return false; }
    return true;
  }).sort((a,b)=>`${a.last_name}`.localeCompare(b.last_name));
  const tb = document.getElementById('emp-tbody');
  tb.innerHTML = rows.length ? rows.map(e=>`
    <tr class="clickable" onclick="employeeDetail('${e.id}')">
      <td>${avatarHtml(e)}</td>
      <td><strong>${esc(e.first_name)} ${esc(e.last_name)}</strong></td>

      <td>${statusBadge(e.status)}</td>
    </tr>`).join('') : `<tr><td colspan="8"><div class="empty">No employees match.</div></td></tr>`;
}

async function saveEmployee(ev, id){
  ev.preventDefault();
  const existing = id ? empById(id) : null;
  let photo = existing?.photo || null;
  const fileEl = document.getElementById('f-photo');
  if (fileEl.files[0]) photo = await fileToDataURL(fileEl.files[0]);
  const rec = {
    id: id || uuid(),
    title: val('f-title'),
    employee_number: val('f-num'), first_name: val('f-fn'), last_name: val('f-ln'),
    preferred_name: existing?.preferred_name||'',
    date_of_birth: val('f-dob'), gender: val('f-gender'), ni_number: val('f-ni'), tax_code: val('f-tax'),
    address_line1: val('f-a1'), address_line2: val('f-a2'), city: val('f-city'), postcode: val('f-pc'),
    personal_email: val('f-pe'), work_email: val('f-we'), mobile_phone: val('f-mob'), home_phone: existing?.home_phone||'',
    job_title: val('f-jt'), department: val('f-dept'), site: val('f-site'),
    manager_id: val('f-mgr')||null, employment_type: val('f-type'),
    working_hours: numVal('f-hours'), notice_period: val('f-notice'),
    start_date: val('f-start'), end_date: val('f-end')||null, probation_end_date: val('f-prob')||null, status: val('f-status'),
    salary: numVal('f-sal'), pay_frequency: existing?.pay_frequency||'Annual',
    bank_sort_code: val('f-sort'), bank_account: val('f-acct'),
    car_allowance_monthly: Number(val('f-car-allow'))||0,
    car_sacrifice_monthly: Number(val('f-car-sac'))||0,
    pension_sacrifice_pct: Number(val('f-pen-sac-pct'))||0,
    employer_pension_pct: Number(val('f-er-pen-pct'))||0,
    holiday_allowance: numVal('f-hol') ?? DEFAULT_ALLOWANCE,
    photo, notes: val('f-notes'),
    created_at: existing?.created_at || nowISO(), updated_at: nowISO()
  };
  await idbPut('employees', rec);
  await logAction(id?'employee_update':'employee_create', { employee_id: rec.id });
  await refreshCaches();
  closeModal();
  toast(id?'Employee updated':'Employee added');
  if (state.page==='employees'||state.page==='team') navigate(state.page);
  else employeeDetail(rec.id);
}
function fileToDataURL(file){ return new Promise((res,rej)=>{ const r=new FileReader(); r.onload=()=>res(r.result); r.onerror=rej; r.readAsDataURL(file); }); }

async function renderLeave(c, category){
  category = category || 'holiday';
  const isMgr = state.user.role==='manager';
  const scope = isMgr ? teamMemberIds() : null;
  const inCat = l => category==='other' ? OTHER_ABSENCE.includes(l.type) : l.type===category;
  let leave = (await idbGetAll('leave')).filter(inCat);
  if (scope) leave = leave.filter(l => scope.includes(l.employee_id));
  const pending = leave.filter(l=>l.status==='pending').sort((a,b)=>a.start_date.localeCompare(b.start_date));
  const records = leave.filter(l=>l.status!=='pending').sort((a,b)=>b.start_date.localeCompare(a.start_date));
  const meta = {
    holiday:  { recTitle:'Holiday bookings',       recBtn:'+ Record holiday',  preset:'holiday' },
    sickness: { recTitle:'Sickness records',       recBtn:'+ Record sickness', preset:'sickness' },
    other:    { recTitle:'Other absence records',  recBtn:'+ Record absence',  preset:'unpaid' }
  }[category];
  const showType = category==='other';
  if (state.user.role==='hr_admin' || isMgr) setTopbar(`<button class="btn btn-accent" onclick="leaveForm(null,false,'${meta.preset}')">${meta.recBtn}</button>`);
  const typeCol = showType ? '<th>Type</th>' : '';
  const typeCell = l => showType ? `<td><span class="badge ${LEAVE_TYPES[l.type].colour}">${LEAVE_TYPES[l.type].label}</span></td>` : '';
  c.innerHTML = `
    <div class="card">
      <div class="card-head"><h3>Awaiting approval (${pending.length})</h3></div>
      ${pending.length?`<div class="table-wrap"><table><thead><tr><th>Employee</th>${typeCol}<th>From</th><th>To</th><th>Days</th><th>Reason</th><th></th></tr></thead><tbody>${
        pending.map(l=>`<tr><td>${esc(empName(l.employee_id))}</td>${typeCell(l)}<td>${fmtDate(l.start_date)}</td><td>${fmtDate(l.end_date)}</td><td>${l.days}</td><td class="small">${esc(l.reason)||'—'}</td><td style="text-align:right;white-space:nowrap"><button class="btn btn-success btn-sm" onclick="decideLeave('${l.id}','approved')">Approve</button> <button class="btn btn-danger btn-sm" onclick="decideLeave('${l.id}','rejected')">Reject</button></td></tr>`).join('')
      }</tbody></table></div>`:'<div class="empty small">Nothing awaiting approval.</div>'}
    </div>
    <div class="card">

const DOC_CATEGORIES = { policy:'Policy', handbook:'Handbook', form:'Form', contract:'Contract', reference:'Reference letter', other:'Other' };
function docIcon(mime){ if(!mime) return '📄'; if(mime.includes('pdf'))return '📕'; if(mime.includes('image'))return '🖼'; if(mime.includes('word')||mime.includes('document'))return '📘'; if(mime.includes('sheet')||mime.includes('excel'))return '📗'; return '📄'; }

async function renderReports(c){
  const emps = state.employees;
  const active = emps.filter(e=>e.status==='active');
  const leave = await idbGetAll('leave');
  const bounds = await holidayYearBounds();

  // Headcount by site / dept
  const bySite = {}; const byDept = {};
  active.forEach(e=>{ bySite[e.site]=(bySite[e.site]||0)+1; byDept[e.department]=(byDept[e.department]||0)+1; });

  // Absence: sickness in current holiday year
  const sick = leave.filter(l=>l.type==='sickness' && l.status==='approved' && l.start_date>=bounds.start && l.start_date<=bounds.end);
  const sickDays = sick.reduce((a,l)=>a+l.days,0);
  const sickInstances = sick.length;
  // approx working days available = active * ~260
  const workDaysAvail = active.length * 260;
  const absenceRate = workDaysAvail ? (sickDays/workDaysAvail*100) : 0;

  // Retention: starters & leavers in current calendar year
  const yr = thisYear();
  const starters = emps.filter(e=>e.start_date && e.start_date.slice(0,4)===yr).length;
  const leavers = emps.filter(e=>e.end_date && e.end_date.slice(0,4)===yr).length;
  const turnover = active.length ? (leavers/((active.length+leavers))*100) : 0;

  c.innerHTML = `
    <div class="stat-grid">
      <div class="stat"><div class="num">${active.length}</div><div class="lbl">Current employees</div></div>
      <div class="stat ${absenceRate>3?'warn':'ok'}"><div class="num">${absenceRate.toFixed(1)}%</div><div class="lbl">Absence rate (${bounds.label})</div></div>
      <div class="stat info"><div class="num">${starters}</div><div class="lbl">Starters ${yr}</div></div>
      <div class="stat ${leavers?'warn':'ok'}"><div class="num">${leavers}</div><div class="lbl">Leavers ${yr}</div></div>
      <div class="stat"><div class="num">${turnover.toFixed(1)}%</div><div class="lbl">Turnover ${yr}</div></div>
    </div>

    <div class="form-row">
      <div class="card"><div class="card-head"><h3>Headcount by site</h3></div>
        <table><tbody>${SITES.map(s=>`<tr><td>${s}</td><td style="text-align:right"><strong>${bySite[s]||0}</strong></td></tr>`).join('')}</tbody></table>
      </div>
      <div class="card"><div class="card-head"><h3>Headcount by department</h3></div>
        <table><tbody>${Object.keys(byDept).sort().map(d=>`<tr><td>${esc(d)}</td><td style="text-align:right"><strong>${byDept[d]}</strong></td></tr>`).join('')||'<tr><td class="muted">—</td></tr>'}</tbody></table>
      </div>
    </div>

    <div class="card"><div class="card-head"><h3>Absence summary (${bounds.label})</h3><button class="btn btn-outline btn-sm" onclick="exportAbsence()">Export CSV</button></div>

// UK tax year: 6 April – 5 April. Override via setting 'tax_year_start' (MM-DD).
async function taxYearBounds(ref){
  const mmdd = await getSetting('tax_year_start','04-06');
  const [mm,dd] = mmdd.split('-').map(Number);
  const r = ref ? new Date(ref) : new Date();
  let startYear = r.getFullYear();
  const boundary = new Date(startYear, mm-1, dd);
  if (r < boundary) startYear -= 1;
  const start = new Date(startYear, mm-1, dd);
  const end = new Date(startYear+1, mm-1, dd); end.setDate(end.getDate()-1);
  return { start: start.toISOString().slice(0,10), end: end.toISOString().slice(0,10), label:`${startYear}/${String(startYear+1).slice(2)}` };
}
function fmtPay(n){ if (n==null||isNaN(n)) return '0.00'; const v=Number(n); return (v<0?'-':'')+'£'+Math.abs(v).toLocaleString('en-GB',{minimumFractionDigits:2,maximumFractionDigits:2}); }
function fmtPayPlain(n){ if (n==null||isNaN(n)) return '0.00'; return Number(n).toLocaleString('en-GB',{minimumFractionDigits:2,maximumFractionDigits:2}); }
function toMoney(n){ return Math.round((Number(n)||0)*100)/100; }
function periodLabel(period){ if(!period||!/^\d{4}-\d{2}$/.test(period)) return period||'—'; const [y,m]=period.split('-').map(Number); return new Date(y,m-1,1).toLocaleDateString('en-GB',{month:'long',year:'numeric'}); }
function periodMonthNumber(period){ // 1-based month of UK tax year (Apr=1)
  if(!period) return ''; const m=Number(period.split('-')[1]); return ((m+8)%12)+1;
}
function payslipTotals(lines){
  let gross=0, deductions=0;
  let employerNI=0, employerPension=0;
  lines.forEach(l => {
    const amt = Number(l.amount)||0;
    if (l.category==='payment') gross += amt;
    else if (l.category==='deduction') deductions += amt;
    else if (l.category==='other'){
      if (l.code==='ni_er') employerNI += amt;
      if (l.code==='pension_er') employerPension += amt;
    }
  });
  return { gross: toMoney(gross), deductions: toMoney(deductions), net: toMoney(gross-deductions), employer_ni: toMoney(employerNI), employer_pension: toMoney(employerPension) };
}
async function ytdForEmployee(empId, uptoPeriod){
  // Sum finalised payslips for the employee in the current tax year UP TO and including uptoPeriod.
  const bounds = await taxYearBounds(uptoPeriod ? uptoPeriod+'-01' : null);
  const runs = await idbGetAll('pay_runs');
  const inYearRuns = runs.filter(r => r.status==='finalised' && r.pay_date>=bounds.start && r.pay_date<=bounds.end && (!uptoPeriod || r.period<=uptoPeriod));
  const runIds = new Set(inYearRuns.map(r=>r.id));
  const slips = (await idbByIndex('payslips','employee_id',empId)).filter(p => runIds.has(p.pay_run_id));
  let gross=0, paye=0, nicEe=0, niEr=0, pensionEr=0;

    (p.lines||[]).forEach(l => {

      if (l.code==='ni_er') niEr += Number(l.amount)||0;

    });
  });
  return { gross:toMoney(gross), paye:toMoney(paye), nic_ee:toMoney(nicEe), ni_er:toMoney(niEr), pension_er:toMoney(pensionEr), bounds };
}

// ─── UK PAYE / NIC calculation engine ───
// Simplified Month 1 / non-cumulative calculation. Rates default to 2025/26.
// All thresholds + rates are stored as settings so they can be updated later
// (or pulled from HMRC once that integration is added).
async function getPayrollSettings(){
  const g = (k,d)=>getSetting(k,d).then(v=>v==null?d:Number(v));
  return {
    paye: {
      basicPct:        await g('paye_basic_pct', 20),
      higherPct:       await g('paye_higher_pct', 40),
      additionalPct:   await g('paye_additional_pct', 45),
      basicBandMonthly:  await g('paye_basic_band_monthly', 3141.67),   // 37,700 / 12
      higherBandMonthly: await g('paye_higher_band_monthly', 6238.33)   // 74,870 / 12 (50,270 -> 125,140)
    },
    nicEe: {
      ptMonthly:  await g('nic_ee_pt_monthly', 1048),     // ≈ Primary Threshold
      uelMonthly: await g('nic_ee_uel_monthly', 4189),    // ≈ UEL
      rate1Pct:   await g('nic_ee_rate1_pct', 8),         // PT -> UEL
      rate2Pct:   await g('nic_ee_rate2_pct', 2)          // above UEL
    },
    nicEr: {
      stMonthly: await g('nic_er_st_monthly', 417),       // ≈ Secondary Threshold (2025/26 reduced)
      ratePct:   await g('nic_er_rate_pct', 15)
    }
  };
}
function taxCodeScheme(code){
  if (!code) return 'L';
  code = String(code).toUpperCase().trim();
  if (['BR','D0','D1','NT','0T'].includes(code)) return code;
  return 'L';
}
function taxCodeAllowance(code){
  if (!code) return 12570;
  code = String(code).toUpperCase().trim();
  if (code === 'NT') return Infinity;
  if (['BR','D0','D1','0T'].includes(code)) return 0;
  const m = code.match(/^(\d+)L$/);
  if (m) return Number(m[1]) * 10;
  return 12570;
}
function calcPAYE(taxableMonthly, taxCode, s){
  const scheme = taxCodeScheme(taxCode);
  if (scheme==='NT' || taxableMonthly<=0) return 0;
  if (scheme==='BR') return toMoney(taxableMonthly * s.paye.basicPct/100);
  if (scheme==='D0') return toMoney(taxableMonthly * s.paye.higherPct/100);
  if (scheme==='D1') return toMoney(taxableMonthly * s.paye.additionalPct/100);
  const allowance = scheme==='0T' ? 0 : taxCodeAllowance(taxCode)/12;
  let taxable = Math.max(0, taxableMonthly - allowance);
  let tax = 0;
  if (taxable <= 0) return 0;
  const inBasic = Math.min(taxable, s.paye.basicBandMonthly);
  tax += inBasic * s.paye.basicPct/100; taxable -= inBasic;
  if (taxable > 0){
    const inHigher = Math.min(taxable, s.paye.higherBandMonthly);
    tax += inHigher * s.paye.higherPct/100; taxable -= inHigher;
  }
  if (taxable > 0) tax += taxable * s.paye.additionalPct/100;
  return toMoney(tax);
}
function calcNicEe(grossMonthly, s){
  const pt = s.nicEe.ptMonthly, uel = s.nicEe.uelMonthly;
  if (grossMonthly <= pt) return 0;
  const inBand1 = Math.min(grossMonthly, uel) - pt;
  const inBand2 = Math.max(0, grossMonthly - uel);
  return toMoney(inBand1 * s.nicEe.rate1Pct/100 + inBand2 * s.nicEe.rate2Pct/100);
}
function calcNicEr(grossMonthly, s){
  const st = s.nicEr.stMonthly;
  if (grossMonthly <= st) return 0;
  return toMoney((grossMonthly - st) * s.nicEr.ratePct/100);
}
// Build a fully calculated set of payslip lines for one employee
async function buildCalculatedLines(emp, settings){
  if (!settings) settings = await getPayrollSettings();
  const basic     = toMoney((Number(emp.salary)||0)/12);
  const carAll    = toMoney(Number(emp.car_allowance_monthly)||0);
  const carSac    = toMoney(Number(emp.car_sacrifice_monthly)||0);
  const penSacPct = Number(emp.pension_sacrifice_pct)||0;
  const erPenPct  = Number(emp.employer_pension_pct)||0;
  const penSac    = toMoney(basic * penSacPct/100);
  const erPension = toMoney(basic * erPenPct/100);

  const lines = [];
  lines.push({ code:'basic_pay',     label:'Basic Pay',                  category:'payment',  units:1, rate:basic,  amount:basic });
  if (carAll) lines.push({ code:'car_allowance', label:'Car Allowance', category:'payment',  units:1, rate:carAll, amount:carAll });
  if (penSac) lines.push({ code:'pension_sacrifice', label:'Salary Sacrifice (Pension)', category:'payment', units:1, rate:-penSac, amount:-penSac });
  if (carSac) lines.push({ code:'car_sacrifice',     label:'Salary Sacrifice (Car)',     category:'payment', units:1, rate:-carSac, amount:-carSac });

  // Taxable / NI-able gross is the sum of payments (sacrifices net in as negatives)
  const grossTaxable = toMoney(lines.filter(l=>l.category==='payment').reduce((a,l)=>a+l.amount,0));
  const paye   = calcPAYE(grossTaxable, emp.tax_code||'1257L', settings);
  const nicEe  = calcNicEe(grossTaxable, settings);
  const nicEr  = calcNicEr(grossTaxable, settings);

  lines.push({ code:'paye',        label:'PAYE',              category:'deduction', units:1, rate:paye,   amount:paye });
  lines.push({ code:'nic_ee',      label:'Employees NIC',     category:'deduction', units:1, rate:nicEe,  amount:nicEe });
  if (erPension) lines.push({ code:'pension_er', label:'Employers Pension', category:'other', units:1, rate:erPension, amount:erPension });
  lines.push({ code:'ni_er',       label:'Employers NI',      category:'other',     units:1, rate:nicEr,  amount:nicEr });
  return lines;
}
// Given a current set of payment lines, recompute PAYE / NIC / Employer NI / Employer pension based on the employee's settings.
// Keeps payment lines as-is so manual overtime etc. is preserved.
async function recomputeStatutoryLines(emp, payLines, settings){
  if (!settings) settings = await getPayrollSettings();
  const grossTaxable = toMoney(payLines.filter(l=>l.category==='payment').reduce((a,l)=>a+(Number(l.amount)||0),0));
  const basic = (payLines.find(l=>l.code==='basic_pay')?.amount) || (Number(emp.salary)||0)/12;
  const paye   = calcPAYE(grossTaxable, emp.tax_code||'1257L', settings);
  const nicEe  = calcNicEe(grossTaxable, settings);
  const nicEr  = calcNicEr(grossTaxable, settings);
  const erPension = toMoney(Number(basic) * (Number(emp.employer_pension_pct)||0)/100);
  // Strip existing statutory lines and re-add
  const kept = payLines.filter(l => !['paye','nic_ee','ni_er','pension_er'].includes(l.code));
  kept.push({ code:'paye',   label:'PAYE',          category:'deduction', units:1, rate:paye,  amount:paye });
  kept.push({ code:'nic_ee', label:'Employees NIC', category:'deduction', units:1, rate:nicEe, amount:nicEe });
  if (erPension) kept.push({ code:'pension_er', label:'Employers Pension', category:'other', units:1, rate:erPension, amount:erPension });
  kept.push({ code:'ni_er', label:'Employers NI', category:'other', units:1, rate:nicEr, amount:nicEr });
  return kept;
}

async function savePayComponent(ev, id){
  ev.preventDefault();
  const all = await idbGetAll('pay_components');
  const existing = id ? all.find(x=>x.id===id) : null;
  const code = val('pc-code');
  if (!id && all.some(x=>x.code===code)){ toast('A component with that code already exists','error'); return; }
  const rec = {
    id: id||uuid(),
    code,
    label: val('pc-label'),
    category: existing?.system ? existing.category : val('pc-cat'),
    display_order: Number(val('pc-order'))||0,
    default_amount: Number(val('pc-default'))||0,
    recurring: val('pc-recurring')==='true',
    enabled: val('pc-enabled')==='true',
    system: existing?.system||false,
    computed: existing?.computed,
    hourly: existing?.hourly
  };
  await idbPut('pay_components', rec);
  closeModal(); toast('Component saved'); navigate('pay-components');
}
async function deletePayComponent(id){
  const c = (await idbGetAll('pay_components')).find(x=>x.id===id);
  if (c?.system){ toast('System components can only be disabled','error'); return; }
  if (!confirm('Delete this pay component? Existing payslips already using it will be unaffected.')) return;
  await idbDelete('pay_components', id);
  toast('Deleted'); navigate('pay-components');
}

async function saveUser(ev, id){
  ev.preventDefault();
  const all = await idbGetAll('users');
  const existing = id ? all.find(x=>x.id===id) : null;
  const username = val('us-username').toLowerCase();
  if (!existing && all.some(x=>x.username.toLowerCase()===username)){ toast('Username already exists','error'); return; }
  let password_hash = existing?.password_hash;
  if (!id) password_hash = await sha256(val('us-pwd'));
  await idbPut('users', { id:id||uuid(), username, password_hash, role:val('us-role'), employee_id:val('us-emp')||null, full_name:val('us-name'), must_change_password: !id, created_at:existing?.created_at||nowISO() });
  await logAction(id?'user_update':'user_create', { username });
  await refreshCaches();
  closeModal(); toast('Account saved'); navigate('users');
}
async function resetPwd(id){
  const np = prompt('Enter a new temporary password:', 'Welcome123');
  if (!np) return;
  const u = (await idbGetAll('users')).find(x=>x.id===id);
  u.password_hash = await sha256(np); u.must_change_password = true;
  await idbPut('users', u);
  await logAction('password_reset', { username:u.username });
  toast('Password reset');
}
async function deleteUser(id){ const u=(await idbGetAll('users')).find(x=>x.id===id); if(u.username==='admin'){toast('Cannot delete admin','error');return;} if(!confirm('Delete this account?'))return; await idbDelete('users',id); await refreshCaches(); toast('Account deleted'); navigate('users'); }

  if (!confirm('This deletes ALL HR data in this browser and reloads demo data. Continue?')) return;
  for (const s of STORES){ const all = await idbGetAll(s); for (const r of all){ await idbDelete(s, r[(s==='settings')?'key':'id']); } }
  await seedDefaults(); toast('Data reset'); logout();
}

async function renderMySickness(c){
  const id = state.user.employee_id;
  if (!id){ c.innerHTML='<div class="empty">No employee record linked to your account.</div>'; return; }
  const bounds = await holidayYearBounds();
  const sickness = (await idbByIndex('leave','employee_id',id)).filter(l=>l.type==='sickness').sort((a,b)=>b.start_date.localeCompare(a.start_date));
  const thisYr = sickness.filter(l=>l.start_date>=bounds.start && l.start_date<=bounds.end);
  const totalDays = thisYr.reduce((a,l)=>a+l.days,0);
  c.innerHTML = `
    <div class="stat-grid">
      <div class="stat ${totalDays>0?'warn':'ok'}"><div class="num">${totalDays}</div><div class="lbl">Sick days (${bounds.label})</div></div>
      <div class="stat"><div class="num">${thisYr.length}</div><div class="lbl">Episodes (${bounds.label})</div></div>
    </div>
    <div class="card"><div class="card-head"><h3>My sickness</h3></div>
      ${sickness.length?`<div class="table-wrap"><table><thead><tr><th>From</th><th>To</th><th>Days</th><th>Reason / notes</th></tr></thead><tbody>${
        sickness.map(l=>`<tr><td>${fmtDate(l.start_date)}</td><td>${fmtDate(l.end_date)}</td><td>${l.days}</td><td class="small">${esc(l.reason)||'—'}</td></tr>`).join('')
      }</tbody></table></div>`:'<div class="empty small">No sickness recorded. Sickness is logged by HR or your manager.</div>'}
    </div>`;
}
async function renderMyOther(c){
  const id = state.user.employee_id;
  if (!id){ c.innerHTML='<div class="empty">No employee record linked to your account.</div>'; return; }
  const other = (await idbByIndex('leave','employee_id',id)).filter(l=>OTHER_ABSENCE.includes(l.type)).sort((a,b)=>b.start_date.localeCompare(a.start_date));
  c.innerHTML = `
    <div class="card"><div class="card-head"><h3>My other absences</h3></div>
      <p class="small muted" style="margin-bottom:10px">Unpaid leave, maternity/paternity and other. Recorded by HR or your manager.</p>
      ${other.length?`<div class="table-wrap"><table><thead><tr><th>Type</th><th>From</th><th>To</th><th>Days</th><th>Status</th><th>Reason</th></tr></thead><tbody>${
        other.map(l=>`<tr><td><span class="badge ${LEAVE_TYPES[l.type].colour}">${LEAVE_TYPES[l.type].label}</span></td><td>${fmtDate(l.start_date)}</td><td>${fmtDate(l.end_date)}</td><td>${l.days}</td><td>${leaveStatusBadge(l.status)}</td><td class="small">${esc(l.reason)||'—'}</td></tr>`).join('')
      }</tbody></table></div>`:'<div class="empty small">No other absences recorded.</div>'}
    </div>`;
}
async function cancelMyLeave(id){ if(!confirm('Cancel this request?'))return; const l=(await idbGetAll('leave')).find(x=>x.id===id); l.status='cancelled'; await idbPut('leave',l); toast('Request cancelled'); navigate('my-leave'); }

async function renderMyPerformance(c){
  const id = state.user.employee_id;
  if (!id){ c.innerHTML='<div class="empty">No employee record linked to your account.</div>'; return; }
  const reviews = (await idbByIndex('reviews','employee_id',id)).sort((a,b)=>(b.scheduled_date||'').localeCompare(a.scheduled_date||''));
  const objectives = await idbByIndex('objectives','employee_id',id);
  c.innerHTML = `
    <div class="card"><div class="card-head"><h3>My reviews & appraisals</h3></div>
      ${reviews.length?`<div class="table-wrap"><table><thead><tr><th>Type</th><th>Period</th><th>Date</th><th>Rating</th><th>Status</th><th></th></tr></thead><tbody>${
        reviews.map(r=>`<tr><td>${r.type==='annual'?'Annual appraisal':'Mid-year review'}</td><td>${esc(r.period)}</td><td>${fmtDate(r.scheduled_date)}</td><td>${esc(r.overall_rating)||'—'}</td><td>${reviewStatusBadge(r.status)}</td><td style="text-align:right"><button class="btn btn-outline btn-sm" onclick="reviewForm('${id}','${r.id}')">${r.status==='completed'?'View':'Add self-assessment'}</button></td></tr>`).join('')
      }</tbody></table></div>`:'<div class="empty small">No reviews scheduled yet.</div>'}
    </div>
    <div class="card"><div class="card-head"><h3>My objectives</h3></div>
      ${objectives.length?objectives.map(o=>`<div class="doc-row"><div class="di"><div class="t">${esc(o.title)} ${objStatusBadge(o.status)}</div><div class="small muted">${esc(o.description)||''}</div><div class="small muted">Target ${fmtDate(o.target_date)}</div><div class="progress" style="margin-top:6px"><div style="width:${o.progress}%"></div></div></div></div>`).join(''):'<div class="empty small">No objectives set yet.</div>'}
    </div>`;
}

function changeMyPassword(){
  openModal(`<h2>Change my password</h2>
    <form onsubmit="saveMyPassword(event)">
      <div class="form-group"><label class="req">Current password</label><input id="pw-cur" type="password" required></div>
      <div class="form-group"><label class="req">New password</label><input id="pw-new" type="password" required minlength="6"></div>
      <div class="form-group"><label class="req">Confirm new password</label><input id="pw-conf" type="password" required></div>
      <div class="modal-actions"><button type="button" class="btn btn-outline" onclick="closeModal()">Cancel</button><button type="submit" class="btn btn-primary">Change password</button></div>
    </form>`);
}
async function saveMyPassword(ev){
  ev.preventDefault();
  const cur = await sha256(val('pw-cur'));
  if (cur !== state.user.password_hash){ toast('Current password incorrect','error'); return; }
  if (val('pw-new') !== val('pw-conf')){ toast('New passwords do not match','error'); return; }
  state.user.password_hash = await sha256(val('pw-new')); state.user.must_change_password=false;
  await idbPut('users', state.user);
  closeModal(); toast('Password changed');
}
